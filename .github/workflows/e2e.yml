# Live E2E tests against Aptos + Circle + MySQL. Requires repository secrets.
# When secrets are unset (e.g. fork PRs, where GitHub withholds secrets), the
# gate step below flips skip=1 and the remaining steps no-op. This keeps the
# job green for contributors who can't run a real Circle account.

name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  # Run on PRs too so every change is exercised against live Circle + Aptos
  # before merging. For PRs from forks, secrets are not exposed and the job
  # short-circuits via the "Check E2E secrets" gate.
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight E2E runs when a new commit is pushed to the same PR. E2E
# burns real Circle signatures and Aptos testnet txns — racing two runs
# against the same account causes sequence-number contention that looks like
# a test failure but is really just CI queueing.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-live:
    name: E2E (live)
    runs-on: ubuntu-latest
    # Kept a bit above the go-test timeout (30m) so the job wrapper doesn't
    # kill a near-finished run before `go test` can report.
    timeout-minutes: 40
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jcci_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/jcci_e2e?parseTime=true
      API_KEY: ${{ secrets.API_KEY }}
      # IMPORTANT: APTOS_NODE_URL must point at an authenticated endpoint
      # (e.g. a Geomi API key URL). Throughput + simulate + poller traffic
      # blows through the anonymous public-IP rate limit on testnet
      # (40k compute units per 300s) and returns 429s that cascade into
      # flaky test failures unrelated to the pipeline logic.
      APTOS_NODE_URL: ${{ secrets.APTOS_NODE_URL }}
      APTOS_CHAIN_ID: ${{ secrets.APTOS_CHAIN_ID }}
      CIRCLE_API_KEY: ${{ secrets.CIRCLE_API_KEY }}
      CIRCLE_ENTITY_SECRET: ${{ secrets.CIRCLE_ENTITY_SECRET }}
      CIRCLE_WALLETS: ${{ secrets.CIRCLE_WALLETS }}
      # Simulation is on by default; the E2E secret already has a live
      # APTOS_NODE_URL so /transactions/simulate works. Set to false here to
      # bypass pre-submit simulation if debugging.
      SIMULATE_BEFORE_SUBMIT: "true"
      CALIBRATE_GAS_FROM_SIMULATION: "true"
      # Throughput tests enqueue N txs per sender and they drain FIFO. With the
      # default 60s expiry, the tail of an N-deep queue blows past the cutoff
      # against live Circle + testnet latency and fails with
      # "transaction expired before submit" — a test-env timing artifact, not
      # a real system bug. 600s gives comfortable headroom for CI.
      TXN_EXPIRATION_SECONDS: "600"
      # The submitter caps per-record retries against time.Since(CreatedAt).
      # Default is 300s, which is tight for a live Circle + testnet FIFO
      # queue under concurrent load. Raise for CI so throughput-tail retries
      # get room to land before being marked "max retry duration exceeded".
      SUBMITTER_MAX_RETRY_DURATION_SECONDS: "1200"
      E2E_BASE_URL: http://127.0.0.1:8080
      E2E_API_KEY: ${{ secrets.API_KEY }}
      E2E_MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/jcci_e2e?parseTime=true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check E2E secrets
        id: gate
        shell: bash
        run: |
          # Report exactly which required secrets are empty (not which GitHub name is wrong).
          missing=()
          [[ -z "${API_KEY}" ]] && missing+=("API_KEY")
          [[ -z "${APTOS_NODE_URL}" ]] && missing+=("APTOS_NODE_URL")
          [[ -z "${CIRCLE_API_KEY}" ]] && missing+=("CIRCLE_API_KEY")
          [[ -z "${CIRCLE_ENTITY_SECRET}" ]] && missing+=("CIRCLE_ENTITY_SECRET")
          [[ -z "${CIRCLE_WALLETS}" ]] && missing+=("CIRCLE_WALLETS")
          if (( ${#missing[@]} > 0 )); then
            echo "E2E secrets not fully configured — empty in this job: ${missing[*]}"
            echo "Add the corresponding repository secrets and ensure this workflow run is allowed to receive them (same-repo PR/push, not a fork PR)."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server
        if: steps.gate.outputs.skip != '1'
        run: go build -o bin/server ./cmd/server

      - name: Start server
        if: steps.gate.outputs.skip != '1'
        run: |
          ./bin/server &
          for i in $(seq 1 90); do
            curl -sf http://127.0.0.1:8080/v1/health && exit 0
            sleep 1
          done
          echo "server did not become healthy"
          exit 1

      - name: Run E2E tests
        if: steps.gate.outputs.skip != '1'
        # -timeout bumped to 30m: the default 10m was aborting the run before
        # later tests (status monotonicity, idempotency, stale recovery) even
        # got to run, because throughput tests can now take 5m+ each against
        # live Circle + testnet.
        run: go test -tags=e2e ./examples/ -count=1 -v -timeout=30m

      - name: E2E skipped
        if: steps.gate.outputs.skip == '1'
        run: echo "OK — no secrets, E2E skipped"
