name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          test -z "$(gofumpt -l .)" || {
            echo "Files not formatted with gofumpt:"
            gofumpt -l .
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -count=1 -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/server

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build server
        run: go build -o bin/server ./cmd/server

      - name: Start server in testing mode
        run: |
          TESTING_MODE=true SQLITE_PATH=:memory: ./bin/server &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v1/health && break
            sleep 1
          done

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh

  e2e:
    name: E2E (devnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Aptos CLI
        run: |
          python3 -c "
          import urllib.request, subprocess, sys
          urllib.request.urlretrieve('https://aptos.dev/scripts/install_cli.py', '/tmp/install.py')
          subprocess.run([sys.executable, '/tmp/install.py'], check=True)
          "
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: E2E tests
        run: go test -tags e2e -count=1 -v -timeout 5m ./e2e/
