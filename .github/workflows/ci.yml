name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          test -z "$(gofumpt -l .)" || {
            echo "Files not formatted with gofumpt:"
            gofumpt -l .
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          GO_VERSION=$(go env GOVERSION)
          GOTOOLCHAIN=${GO_VERSION} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -count=1 -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/server

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build server
        run: go build -o bin/server ./cmd/server

      - name: Start server in testing mode
        run: |
          TESTING_MODE=true ./bin/server &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v1/health && break
            sleep 1
          done

      - name: Run smoke tests
        run: |
          set -e
          echo "=== Health check ==="
          curl -sf http://localhost:8080/v1/health | grep -q '"status":"ok"'
          echo "PASS: health"

          echo "=== Auth not required in testing mode ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/v1/query \
            -H 'Content-Type: application/json' \
            -d '{"function_id":"0x1::coin::name","type_arguments":["0x1::aptos_coin::AptosCoin"],"arguments":[]}')
          # Should get 503 (not configured) or 502/200, but never 401
          if [ "$STATUS" = "401" ]; then
            echo "FAIL: got 401 in testing mode"
            exit 1
          fi
          echo "PASS: auth bypass in testing mode (status=$STATUS)"

          echo "=== Transaction not found ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/v1/transactions/nonexistent)
          if [ "$STATUS" != "404" ]; then
            echo "FAIL: expected 404, got $STATUS"
            exit 1
          fi
          echo "PASS: transaction not found returns 404"

          echo "All smoke tests passed!"
